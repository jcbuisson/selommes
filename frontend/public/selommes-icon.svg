<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Selommes house icon">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#86B4CC"/>
      <stop offset="1" stop-color="#5C92AD"/>
    </linearGradient>
    <linearGradient id="wall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#EFE6D0"/>
      <stop offset="1" stop-color="#E2D6BB"/>
    </linearGradient>
    <linearGradient id="roof" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4A565F"/>
      <stop offset="1" stop-color="#39434B"/>
    </linearGradient>
    <clipPath id="round"><rect width="512" height="512" rx="112"/></clipPath>
  </defs>

  <g clip-path="url(#round)">
    <!-- sky background -->
    <rect width="512" height="512" fill="url(#sky)"/>

    <!-- scale the house to nearly fill the tile -->
    <g transform="translate(256,265) scale(1.55) translate(-256,-265)">

    <!-- chimney (behind roof) -->
    <rect x="186" y="120" width="30" height="80" rx="2" fill="#A85F45"/>
    <rect x="182" y="116" width="38" height="12" rx="2" fill="#8F4E37"/>

    <!-- roof -->
    <path d="M256 116 L372 200 L140 200 Z" fill="url(#roof)"/>
    <path d="M256 116 L372 200 L140 200 Z" fill="none" stroke="#2E373E" stroke-width="6" stroke-linejoin="round"/>

    <!-- building body -->
    <rect x="158" y="198" width="196" height="216" fill="url(#wall)"/>

    <!-- quoins: interlocking stone blocks on both edges -->
    <g fill="#F8F2E4">
      <!-- left edge -->
      <rect x="158" y="198" width="36" height="27"/>
      <rect x="158" y="252" width="36" height="27"/>
      <rect x="158" y="306" width="36" height="27"/>
      <rect x="158" y="360" width="36" height="27"/>
      <rect x="158" y="225" width="24" height="27"/>
      <rect x="158" y="279" width="24" height="27"/>
      <rect x="158" y="333" width="24" height="27"/>
      <rect x="158" y="387" width="24" height="27"/>
      <!-- right edge -->
      <rect x="318" y="198" width="36" height="27"/>
      <rect x="318" y="252" width="36" height="27"/>
      <rect x="318" y="306" width="36" height="27"/>
      <rect x="318" y="360" width="36" height="27"/>
      <rect x="330" y="225" width="24" height="27"/>
      <rect x="330" y="279" width="24" height="27"/>
      <rect x="330" y="333" width="24" height="27"/>
      <rect x="330" y="387" width="24" height="27"/>
    </g>

    <!-- windows: 1 centered near roof + 2x2 grid below, even vertical rhythm -->
    <g>
      <!-- surrounds -->
      <g fill="#F8F2E4">
        <rect x="230" y="210" width="52" height="56"/>
        <rect x="198" y="278" width="50" height="56"/>
        <rect x="264" y="278" width="50" height="56"/>
        <rect x="198" y="346" width="50" height="56"/>
        <rect x="264" y="346" width="50" height="56"/>
      </g>
      <!-- panes / shutters -->
      <g fill="#5E7E92">
        <rect x="236" y="216" width="40" height="44"/>
        <rect x="204" y="284" width="38" height="44"/>
        <rect x="270" y="284" width="38" height="44"/>
        <rect x="204" y="352" width="38" height="44"/>
        <rect x="270" y="352" width="38" height="44"/>
      </g>
      <!-- central mullions -->
      <g stroke="#41596A" stroke-width="3">
        <line x1="256" y1="216" x2="256" y2="260"/>
        <line x1="223" y1="284" x2="223" y2="328"/>
        <line x1="289" y1="284" x2="289" y2="328"/>
        <line x1="223" y1="352" x2="223" y2="396"/>
        <line x1="289" y1="352" x2="289" y2="396"/>
      </g>
    </g>

    </g>
  </g>
</svg>
